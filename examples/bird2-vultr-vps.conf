###############################################################################
# Static example: BIRD 2 on Vultr Cloud Compute / VPS.
#
# Replace the bracketed placeholders before use.
###############################################################################

router id 203.0.113.10;            # <PUBLIC_IPV4_OF_INSTANCE>

log syslog all;

protocol device {
    scan time 10;
}

protocol direct {
    ipv4;
    ipv6;
    interface "lo", "dummy*", "eth*", "ens*", "eno*", "enp*";
}

protocol kernel kernel4 {
    ipv4 { export all; };
    learn;
}

protocol kernel kernel6 {
    ipv6 { export all; };
    learn;
}

# Origin routes - the prefixes WE announce. Must be reachable on the host.
protocol static static_ipv4 {
    ipv4;
    route 198.51.100.0/24 reject;
}

protocol static static_ipv6 {
    ipv6;
    route 2001:db8:100::/48 reject;
}

filter vultr_export_ipv4 {
    if net ~ [ 198.51.100.0/24 ] then accept;
    reject;
}

filter vultr_export_ipv6 {
    if net ~ [ 2001:db8:100::/48 ] then accept;
    reject;
}

protocol bgp vultr_ipv4 {
    description "Vultr VPS IPv4";
    local 203.0.113.10 as 64512;       # <SOURCE_IPV4> as <LOCAL_ASN>
    neighbor 169.254.169.254 as 64515;
    multihop 2;
    password "change-me";              # <BGP_PASSWORD>

    ipv4 {
        import all;
        export filter vultr_export_ipv4;
        next hop self;
    };
}

protocol bgp vultr_ipv6 {
    description "Vultr VPS IPv6";
    local 2001:db8::10 as 64512;       # <SOURCE_IPV6> as <LOCAL_ASN>
    neighbor 2001:19f0:ffff::1 as 64515;
    multihop 2;
    password "change-me";              # <BGP_PASSWORD>

    ipv6 {
        import all;
        export filter vultr_export_ipv6;
        next hop self;
    };
}
